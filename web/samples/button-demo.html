<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Botão primário</title>
  <style>
    :root {
      --bg: #0c1222;
      --btn: linear-gradient(135deg, #f59e0b, #d97706);
      --btn-hover: linear-gradient(135deg, #fbbf24, #f59e0b);
      --focus: rgba(20, 184, 166, 0.45);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: system-ui, sans-serif;
    }
    button {
      appearance: none;
      border: none;
      padding: 0.65rem 1.25rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.85rem;
      color: #0c1222;
      background: var(--btn);
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(245, 158, 11, 0.25);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    button:hover {
      background: var(--btn-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(245, 158, 11, 0.35);
    }
    button:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }
  </style>
</head>
<body>
  <button type="button">Continuar</button>
</body>
</html>
